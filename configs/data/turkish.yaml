# Turkish language data pipeline configuration

language: tr
language_name: Turkish

sources:
  huggingface:
    - repo: "TFLai/Turkish-Dialog-Dataset"
      split: train
      format: raw_text

    - repo: "syko818121/Syko-Turkish-Chat-V1"
      split: train
      format: sharegpt

preprocessing:
  min_length: 50
  max_length: 8192
  dedup_method: minhash
  dedup_threshold: 0.85
  clean_html: true
  normalize_unicode: true

output:
  sft_path: "data/processed/turkish_sft.jsonl"
  dpo_path: "data/processed/turkish_dpo.jsonl"
  eval_path: "data/processed/turkish_eval.jsonl"
  eval_split_ratio: 0.05
