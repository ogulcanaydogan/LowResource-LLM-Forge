# Azerbaijani language data pipeline configuration
#
# Azerbaijani (az) is a Turkic language closely related to Turkish,
# sharing significant lexical and grammatical overlap. Fine-tuning
# a Turkish base model on Azerbaijani data can leverage this similarity.

language: az
language_name: Azerbaijani

sources:
  huggingface:
    - repo: "IlkinSuleymanov/AzInstruct_merged"
      split: train
      format: alpaca

preprocessing:
  min_length: 50
  max_length: 8192
  dedup_method: minhash
  dedup_threshold: 0.85
  clean_html: true
  normalize_unicode: true

output:
  sft_path: "data/processed/azerbaijani_sft.jsonl"
  dpo_path: "data/processed/azerbaijani_dpo.jsonl"
  eval_path: "data/processed/azerbaijani_eval.jsonl"
  eval_split_ratio: 0.05
