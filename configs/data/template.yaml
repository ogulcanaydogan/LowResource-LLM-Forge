# Template for adding a new language to the pipeline
# Copy this file and fill in the language-specific values.

language: xx          # ISO 639-1 code
language_name: ""     # Full language name

sources:
  huggingface:
    - repo: ""        # HuggingFace dataset repo
      split: train
      format: alpaca  # alpaca, dpo, raw_text, sharegpt

preprocessing:
  min_length: 50
  max_length: 8192
  dedup_method: minhash
  dedup_threshold: 0.85
  clean_html: true
  normalize_unicode: true

output:
  sft_path: "data/processed/${language}_sft.jsonl"
  dpo_path: "data/processed/${language}_dpo.jsonl"
  eval_path: "data/processed/${language}_eval.jsonl"
  eval_split_ratio: 0.05
