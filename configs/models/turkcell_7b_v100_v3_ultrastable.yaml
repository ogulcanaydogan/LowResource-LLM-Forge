# V100 ultra-stable profile (clean restart)
_base: "../base.yaml"

model:
  name: "TURKCELL/Turkcell-LLM-7b-v1"
  max_seq_length: 2048
  dtype: "float16"

training:
  num_epochs: 3
  max_steps: 8601
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  warmup_ratio: 0.12
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  max_grad_norm: 0.3
  logging_steps: 10
  eval_steps: 500
  save_steps: 250
  save_total_limit: 30
  fp16: true
  bf16: false
  early_stopping_enabled: false

lora:
  r: 32
  alpha: 64

data:
  train_path: "data/processed/turkish_sft.jsonl"
  eval_path: "data/processed/turkish_eval.jsonl"

wandb:
  project: "lowresource-llm-forge"
  run_name: "turkcell-7b-sft-v100-v3-ultrastable"
  enabled: false
