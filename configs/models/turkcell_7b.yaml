# Turkcell-LLM-7b-v1: Mistral-based Turkish LLM
# Trained on 5B Turkish tokens — best Turkish language coverage
# Hardware: Single V100 32GB with QLoRA

_base: "../base.yaml"

model:
  name: "TURKCELL/Turkcell-LLM-7b-v1"
  max_seq_length: 2048
  dtype: "float16"

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  learning_rate: 2.0e-4

data:
  train_path: "data/processed/turkish_sft.jsonl"
  eval_path: "data/processed/turkish_eval.jsonl"

lora:
  r: 32
  alpha: 64

wandb:
  run_name: "turkcell-7b-sft-v1"
