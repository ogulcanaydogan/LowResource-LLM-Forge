# cere-llama-3-8b-tr: Llama3-based Turkish LLM
# Domain-optimized, fine-tuned on Turkish instruction sets
# Hardware: Single V100 32GB with QLoRA

_base: "../base.yaml"

model:
  name: "CerebrumTech/cere-llama-3-8b-tr"
  max_seq_length: 2048
  dtype: "float16"

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  learning_rate: 2.0e-4

data:
  train_path: "data/processed/turkish_sft.jsonl"
  eval_path: "data/processed/turkish_eval.jsonl"

lora:
  r: 32
  alpha: 64

wandb:
  run_name: "llama3-8b-tr-sft-v1"
