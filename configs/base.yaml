# Shared training defaults — language-agnostic
# Hardware target: NVIDIA V100 32GB (Volta, compute capability 7.0)
# CRITICAL: V100 does NOT support bfloat16. Always use fp16.

seed: 42
output_dir: "artifacts/training"

model:
  max_seq_length: 2048
  dtype: "float16"

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  learning_rate: 2.0e-4
  gradient_accumulation_steps: 8
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  eval_steps: 100
  fp16: true
  bf16: false
  seed: 42

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true

wandb:
  project: "lowresource-llm-forge"
  enabled: true
