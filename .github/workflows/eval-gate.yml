name: eval-gate

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: "Path to model (HF repo or local path on runner)"
        required: true
      benchmarks:
        description: "Comma-separated benchmarks (mmlu_tr,perplexity,generation)"
        required: false
        default: "perplexity,generation"
      serve_base_url:
        description: "Optional serving URL for smoke check (e.g. http://10.34.9.233:18000)"
        required: false
        default: ""
      serve_expected_model:
        description: "Optional expected model id in /v1/models response"
        required: false
        default: ""
      serve_api_key:
        description: "Optional API key for Bearer auth against serving endpoint"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1"

jobs:
  evaluate:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra eval

      - name: Resolve run parameters
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            model_path="${{ github.event.inputs.model_path }}"
            benchmarks="${{ github.event.inputs.benchmarks }}"
            serve_base_url="${{ github.event.inputs.serve_base_url }}"
            serve_expected_model="${{ github.event.inputs.serve_expected_model }}"
            serve_api_key="${{ github.event.inputs.serve_api_key }}"
          else
            model_path="/home/weezboo/llm-forge/model-active"
            benchmarks="perplexity,generation"
            serve_base_url="http://127.0.0.1:18000"
            serve_expected_model="/home/weezboo/llm-forge/model-active"
            serve_api_key=""
          fi

          echo "model_path=${model_path}" >> "${GITHUB_OUTPUT}"
          echo "benchmarks=${benchmarks}" >> "${GITHUB_OUTPUT}"
          echo "serve_base_url=${serve_base_url}" >> "${GITHUB_OUTPUT}"
          echo "serve_expected_model=${serve_expected_model}" >> "${GITHUB_OUTPUT}"
          echo "serve_api_key=${serve_api_key}" >> "${GITHUB_OUTPUT}"

      - name: Serving smoke check
        if: ${{ steps.params.outputs.serve_base_url != '' }}
        env:
          FORGE_SERVE_BASE_URL: ${{ steps.params.outputs.serve_base_url }}
          FORGE_SERVE_EXPECT_MODEL: ${{ steps.params.outputs.serve_expected_model }}
          FORGE_SERVE_API_KEY: ${{ steps.params.outputs.serve_api_key }}
        run: uv run python scripts/smoke_serve.py

      - name: Download previous eval artifact (best effort)
        if: ${{ steps.params.outputs.serve_base_url != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p artifacts/prev-eval
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request
          import zipfile

          token = os.environ.get("GH_TOKEN", "")
          repo = os.environ["GITHUB_REPOSITORY"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          ref_name = os.environ.get("GITHUB_REF_NAME", "")

          if not token:
              raise SystemExit("GH_TOKEN missing; skipping previous artifact download.")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          artifacts_url = (
              f"https://api.github.com/repos/{repo}/actions/artifacts"
              "?name=eval-results&per_page=100"
          )
          req = urllib.request.Request(artifacts_url, headers=headers)
          with urllib.request.urlopen(req, timeout=30) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          candidate = None
          for artifact in payload.get("artifacts", []):
              if artifact.get("expired"):
                  continue
              workflow_run = artifact.get("workflow_run") or {}
              run_id = int(workflow_run.get("id") or 0)
              if run_id <= 0 or run_id == current_run_id:
                  continue
              if workflow_run.get("head_branch") != ref_name:
                  continue
              candidate = artifact
              break

          if not candidate:
              print("No previous eval-results artifact found on this branch.")
              raise SystemExit(0)

          download_url = candidate["archive_download_url"]
          zip_path = pathlib.Path("artifacts/prev-eval.zip")
          req = urllib.request.Request(download_url, headers=headers)
          with urllib.request.urlopen(req, timeout=60) as resp:
              zip_path.write_bytes(resp.read())

          extract_dir = pathlib.Path("artifacts/prev-eval")
          with zipfile.ZipFile(zip_path) as zf:
              zf.extractall(extract_dir)
          print(f"Downloaded prior artifact id={candidate['id']} to {extract_dir}")
          PY

      - name: Run endpoint benchmark
        if: ${{ steps.params.outputs.serve_base_url != '' }}
        env:
          FORGE_SERVE_API_KEY: ${{ steps.params.outputs.serve_api_key }}
        shell: bash
        run: |
          mkdir -p artifacts/eval/benchmark
          if [[ -n "${{ steps.params.outputs.serve_expected_model }}" ]]; then
            uv run python scripts/benchmark_openai_endpoint.py \
              --base-url "${{ steps.params.outputs.serve_base_url }}" \
              --model "${{ steps.params.outputs.serve_expected_model }}" \
              --runs-per-prompt 1 \
              --output artifacts/eval/benchmark/current.json
          else
            uv run python scripts/benchmark_openai_endpoint.py \
              --base-url "${{ steps.params.outputs.serve_base_url }}" \
              --runs-per-prompt 1 \
              --output artifacts/eval/benchmark/current.json
          fi

      - name: Compare benchmark with previous run
        if: ${{ steps.params.outputs.serve_base_url != '' }}
        shell: bash
        run: |
          baseline="$(find artifacts/prev-eval -type f -path '*benchmark/current.json' | head -n1 || true)"
          if [[ -n "${baseline}" ]]; then
            uv run python scripts/compare_benchmark_results.py \
              --current artifacts/eval/benchmark/current.json \
              --baseline "${baseline}" \
              --current-label "run-${{ github.run_id }}" \
              --baseline-label "previous" \
              --output-md artifacts/eval/benchmark/compare.md \
              --output-json artifacts/eval/benchmark/compare.json
          else
            uv run python scripts/compare_benchmark_results.py \
              --current artifacts/eval/benchmark/current.json \
              --current-label "run-${{ github.run_id }}" \
              --output-md artifacts/eval/benchmark/compare.md \
              --output-json artifacts/eval/benchmark/compare.json
          fi
          cat artifacts/eval/benchmark/compare.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Run evaluation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: bash
        run: |
          IFS=',' read -ra BENCHMARKS <<< "${{ steps.params.outputs.benchmarks }}"
          ran=0

          for benchmark in "${BENCHMARKS[@]}"; do
            benchmark="$(echo "${benchmark}" | xargs)"
            [[ -z "${benchmark}" ]] && continue
            ran=1
            uv run python scripts/run_eval.py \
              --model "${{ steps.params.outputs.model_path }}" \
              --benchmark "${benchmark}" \
              --output-dir "artifacts/eval/${benchmark}"
          done

          if [[ "${ran}" -eq 0 ]]; then
            uv run python scripts/run_eval.py \
              --model "${{ steps.params.outputs.model_path }}" \
              --output-dir artifacts/eval/
          fi

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: eval-results
          path: artifacts/eval/
