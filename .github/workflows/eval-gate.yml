name: eval-gate

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: "Path to model on HuggingFace Hub"
        required: true
      benchmarks:
        description: "Comma-separated benchmarks (mmlu_tr,perplexity,generation)"
        required: false
        default: "perplexity,generation"
      serve_base_url:
        description: "Optional serving URL for smoke check (e.g. http://10.34.9.233:18000)"
        required: false
        default: ""
      serve_expected_model:
        description: "Optional expected model id in /v1/models response"
        required: false
        default: ""

jobs:
  evaluate:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra eval

      - name: Serving smoke check
        if: ${{ github.event.inputs.serve_base_url != '' }}
        env:
          FORGE_SERVE_BASE_URL: ${{ github.event.inputs.serve_base_url }}
          FORGE_SERVE_EXPECT_MODEL: ${{ github.event.inputs.serve_expected_model }}
        run: uv run python scripts/smoke_serve.py

      - name: Run evaluation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python scripts/run_eval.py \
            --model ${{ github.event.inputs.model_path }} \
            --output-dir artifacts/eval/

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: eval-results
          path: artifacts/eval/
