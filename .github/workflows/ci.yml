name: ci

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  test:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/forge

      - name: Tests
        run: uv run pytest --cov=forge --cov-report=xml --cov-fail-under=40 -v

      - name: Serving smoke check
        env:
          FORGE_SERVE_BASE_URL: ${{ secrets.FORGE_SERVE_BASE_URL }}
          FORGE_SERVE_EXPECT_MODEL: ${{ secrets.FORGE_SERVE_EXPECT_MODEL }}
          FORGE_SERVE_API_KEY: ${{ secrets.FORGE_SERVE_API_KEY }}
        run: |
          if [ "${RUNNER_ENVIRONMENT:-}" != "self-hosted" ]; then
            echo "Non self-hosted runner detected; skipping serving smoke check."
            exit 0
          fi
          if [ -z "${FORGE_SERVE_BASE_URL}" ]; then
            echo "FORGE_SERVE_BASE_URL secret not set; skipping serving smoke check."
            exit 0
          fi
          uv run python scripts/smoke_serve.py

  notify-main-failure:
    if: failure() && github.ref == 'refs/heads/main'
    needs: [pre-commit, test]
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=🚨 MAIN RED — ${{ github.repository }} #${{ github.run_number }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
